apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-demo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/santidesp/mik8s.git'
    targetRevision: HEAD
    path: infrastructure/instances/redis-demo/manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
