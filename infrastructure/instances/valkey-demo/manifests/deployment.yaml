apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey-demo-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey-demo-app
  template:
    metadata:
      labels:
        app: valkey-demo-app
    spec:
      containers:
      - name: app
        image: valkey-demo-app:local
        imagePullPolicy: IfNotPresent
        env:
        - name: VALKEY_HOST
          value: my-valkey-db-svc
        - name: VALKEY_PORT
          value: "6379"
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 2
          timeoutSeconds: 2
          periodSeconds: 3
          failureThreshold: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 1
          timeoutSeconds: 1
          periodSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          timeoutSeconds: 1
          periodSeconds: 10
          failureThreshold: 3
