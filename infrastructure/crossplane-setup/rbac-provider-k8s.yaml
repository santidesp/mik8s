# ClusterRoleBinding para que provider-kubernetes pueda gestionar recursos en el cluster.
# El SA es creado automáticamente por el provider — ajusta el nombre si difiere.
# Para encontrar el SA real: kubectl get sa -n crossplane-system | grep provider-kubernetes
# NOTA: cluster-admin es aceptable para POC; restringir en producción.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-kubernetes-admin
subjects:
  - kind: ServiceAccount
    name: provider-kubernetes
    namespace: crossplane-system
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
